<!doctype html>
<html lang="{{ site.lang | default: 'de' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  {% if page.description or site.description %}
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% endif %}
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <style>
    :root {
      --ink: #1A1A1A;
      --ink-secondary: #4A4A4A;
      --ink-tertiary: #8A8A8A;
      --surface: #F8F1E9;
      --accent: #C8842B;
      --hairline: rgba(26, 26, 26, 0.12);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--surface);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 24px 96px;
    }
    h1, h2, h3 {
      font-family: "Charter", "Iowan Old Style", "Georgia", "Times New Roman", serif;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    h1 {
      font-size: 36px;
      margin: 0 0 24px;
      line-height: 1.15;
    }
    h2 {
      font-size: 24px;
      margin: 48px 0 16px;
      line-height: 1.25;
    }
    h3 {
      font-size: 18px;
      margin: 32px 0 12px;
    }
    p { margin: 0 0 16px; color: var(--ink-secondary); }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(200, 132, 43, 0.3); }
    a:hover { border-bottom-color: var(--accent); }
    strong { color: var(--ink); font-weight: 600; }
    code {
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 0.9em;
      background: rgba(26, 26, 26, 0.05);
      padding: 0.1em 0.35em;
      border-radius: 3px;
    }
    hr {
      border: none;
      border-top: 1px solid var(--hairline);
      margin: 40px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 12px 12px 12px 0;
      border-bottom: 1px solid var(--hairline);
      vertical-align: top;
      color: var(--ink-secondary);
    }
    th { color: var(--ink); font-weight: 600; }
    ul, ol { margin: 0 0 16px; padding-left: 24px; color: var(--ink-secondary); }
    li { margin: 4px 0; }
    .meta {
      font-size: 13px;
      color: var(--ink-tertiary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #F8F1E9;
        --ink-secondary: #C9C2BA;
        --ink-tertiary: #8A8A8A;
        --surface: #1A1A1A;
        --accent: #E0A555;
        --hairline: rgba(248, 241, 233, 0.15);
      }
      code { background: rgba(248, 241, 233, 0.08); }
    }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
