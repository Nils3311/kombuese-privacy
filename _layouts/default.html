<!doctype html>
<html lang="{{ site.lang | default: 'de' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  {% if page.description or site.description %}
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% endif %}
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1A1A1A;
      --ink-secondary: #4A4A4A;
      --ink-tertiary: #8A8A8A;
      --surface: #F2EBDD;
      --surface-elevated: #F8F2E6;
      --accent: #2E5A4A;
      --accent-warm: #E76F51;
      --hairline: rgba(26, 26, 26, 0.12);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--surface);
      color: var(--ink);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    nav.top {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 13px;
    }
    nav.top .brand {
      font-family: "Fraunces", "Charter", "Iowan Old Style", Georgia, serif;
      font-weight: 600;
      font-size: 18px;
      color: var(--accent);
      letter-spacing: -0.01em;
      border: none;
    }
    nav.top .links { display: flex; gap: 20px; }
    nav.top a {
      color: var(--ink-secondary);
      text-decoration: none;
      border: none;
      letter-spacing: 0.02em;
    }
    nav.top a:hover { color: var(--accent); }
    nav.top a[aria-current="page"] {
      color: var(--ink);
      font-weight: 500;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }
    h1, h2, h3 {
      font-family: "Fraunces", "Charter", "Iowan Old Style", Georgia, serif;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.015em;
    }
    h1 {
      font-size: 40px;
      margin: 0 0 24px;
      line-height: 1.1;
    }
    h2 {
      font-size: 24px;
      margin: 48px 0 16px;
      line-height: 1.25;
    }
    h3 {
      font-size: 18px;
      margin: 32px 0 12px;
    }
    p { margin: 0 0 16px; color: var(--ink-secondary); }
    a {
      color: var(--accent-warm);
      text-decoration: none;
      border-bottom: 1px solid rgba(231, 111, 81, 0.35);
      transition: border-color 0.15s ease;
    }
    a:hover { border-bottom-color: var(--accent-warm); }
    strong { color: var(--ink); font-weight: 600; }
    code {
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 0.9em;
      background: rgba(26, 26, 26, 0.05);
      padding: 0.1em 0.35em;
      border-radius: 3px;
    }
    hr {
      border: none;
      border-top: 1px solid var(--hairline);
      margin: 40px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 12px 12px 12px 0;
      border-bottom: 1px solid var(--hairline);
      vertical-align: top;
      color: var(--ink-secondary);
    }
    th { color: var(--ink); font-weight: 600; }
    ul, ol { margin: 0 0 16px; padding-left: 24px; color: var(--ink-secondary); }
    li { margin: 4px 0; }
    .meta {
      font-size: 13px;
      color: var(--ink-tertiary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    details {
      border-top: 1px solid var(--hairline);
      padding: 16px 0;
    }
    details:last-of-type { border-bottom: 1px solid var(--hairline); }
    details summary {
      cursor: pointer;
      list-style: none;
      font-weight: 500;
      color: var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::after {
      content: "+";
      font-family: "Fraunces", serif;
      font-size: 22px;
      color: var(--accent);
      transition: transform 0.2s ease;
      line-height: 1;
    }
    details[open] summary::after { transform: rotate(45deg); }
    details > *:not(summary) { margin-top: 12px; }
    footer.bottom {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 24px 48px;
      font-size: 13px;
      color: var(--ink-tertiary);
      border-top: 1px solid var(--hairline);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #F2EBDD;
        --ink-secondary: #C9C2BA;
        --ink-tertiary: #8A8A8A;
        --surface: #1F2120;
        --surface-elevated: #262827;
        --accent: #6FAF95;
        --accent-warm: #F08E72;
        --hairline: rgba(242, 235, 221, 0.15);
      }
      code { background: rgba(242, 235, 221, 0.08); }
    }
  </style>
</head>
<body>
  <nav class="top">
    <a href="{{ '/' | relative_url }}" class="brand">Kombüse</a>
    <div class="links">
      <a href="{{ '/' | relative_url }}"{% if page.url == "/" or page.url == "/index.html" %} aria-current="page"{% endif %}>Datenschutz</a>
      <a href="{{ '/support/' | relative_url }}"{% if page.url contains "support" %} aria-current="page"{% endif %}>Support</a>
    </div>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer class="bottom">
    © 2026 Nils Hoffmann · <a href="mailto:hofnil@web.de">hofnil@web.de</a>
  </footer>
</body>
</html>
